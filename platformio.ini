; PlatformIO Project Configuration File
;
; DOOM for ESP32-based boards
; https://github.com/id-Software/DOOM

[platformio]
default_envs = lilygo-t-display

[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DDOOM_ESP32
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    TFT_eSPI

[env:lilygo-t-display]
; LilyGo T-Display - ESP32 with ST7789 135x240 TFT
platform = espressif32
board = lilygo-t-display
board_build.partitions = huge_app.csv

build_flags =
    ${env.build_flags}
    -DLILYGO_T_DISPLAY
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DSPI_FREQUENCY=40000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DDOOMGENERIC_RESX=135
    -DDOOMGENERIC_RESY=240
    ; Button pins on T-Display
    -DBUTTON_1=0
    -DBUTTON_2=35

lib_deps =
    ${env.lib_deps}

[env:lilygo-t-display-s3]
; LilyGo T-Display S3 - ESP32-S3 with ST7789 170x320 TFT
platform = espressif32
board = lilygo-t-display-s3
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    ${env.build_flags}
    -DLILYGO_T_DISPLAY_S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_PARALLEL_8_BIT
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DDOOMGENERIC_RESX=170
    -DDOOMGENERIC_RESY=320
    ; Button pins on T-Display S3
    -DBUTTON_1=0
    -DBUTTON_2=14

lib_deps =
    ${env.lib_deps}
