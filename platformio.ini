; PlatformIO Project Configuration File
;
; DOOM for ESP32-based boards
; https://github.com/id-Software/DOOM
;
; Targets:
;   lilygo-t-display        - ESP32, ST7789 135x240 (TFT_eSPI)
;   lilygo-t-display-s3     - ESP32-S3, ST7789 170x320 (TFT_eSPI)
;   esp32-c6-touch-lcd-147  - Waveshare ESP32-C6-Touch-LCD-1.47,
;                             JD9853 172x320 + AXS5106L touch (Arduino_GFX)

[platformio]
default_envs = lilygo-t-display
; Sources live in esp32doom/src (platform glue) and linuxdoom-1.10 (the engine),
; so the project root is the source root and build_src_filter selects what compiles.
src_dir = .

; ---------------------------------------------------------------------------
; Shared DOOM engine wiring. The 1997 linuxdoom sources are compiled directly;
; the Linux/X11-specific modules are excluded and replaced by the ESP32 glue
; in esp32doom/src (video, system, sound, net, touch).
; ---------------------------------------------------------------------------
[doom]
build_src_filter =
    +<esp32doom/src/*.cpp>
    +<linuxdoom-1.10/*.c>
    -<linuxdoom-1.10/i_main.c>
    -<linuxdoom-1.10/i_video.c>
    -<linuxdoom-1.10/i_sound.c>
    -<linuxdoom-1.10/i_net.c>
    -<linuxdoom-1.10/i_system.c>
build_flags =
    -I linuxdoom-1.10
    -I esp32doom/src
    ; NORMALUNIX gives the engine POSIX file I/O (open/read/lseek) which maps
    ; onto the ESP32 VFS once a filesystem (SD/LittleFS) is mounted. LINUX is
    ; intentionally NOT defined (it pulls <values.h>, unavailable in newlib).
    -DNORMALUNIX
    ; Quiet down warnings from 25-year-old C that would otherwise be very noisy.
    -Wno-implicit-function-declaration
    -Wno-deprecated-declarations
    -Wno-format

[env]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = ${doom.build_src_filter}
build_flags =
    ${doom.build_flags}
    -DDOOM_ESP32
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    TFT_eSPI

[env:lilygo-t-display]
; LilyGo T-Display - ESP32 with ST7789 135x240 TFT
platform = espressif32
board = lilygo-t-display
board_build.partitions = huge_app.csv

build_flags =
    ${env.build_flags}
    -DLILYGO_T_DISPLAY
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MISO=-1
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DSPI_FREQUENCY=40000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DDOOMGENERIC_RESX=135
    -DDOOMGENERIC_RESY=240
    ; Button pins on T-Display
    -DBUTTON_1=0
    -DBUTTON_2=35

lib_deps =
    ${env.lib_deps}

[env:lilygo-t-display-s3]
; LilyGo T-Display S3 - ESP32-S3 with ST7789 170x320 TFT
platform = espressif32
board = lilygo-t-display-s3
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    ${env.build_flags}
    -DLILYGO_T_DISPLAY_S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_PARALLEL_8_BIT
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DDOOMGENERIC_RESX=170
    -DDOOMGENERIC_RESY=320
    ; Button pins on T-Display S3
    -DBUTTON_1=0
    -DBUTTON_2=14

lib_deps =
    ${env.lib_deps}

[env:esp32-c6-touch-lcd-147]
; Waveshare ESP32-C6-Touch-LCD-1.47
;   MCU    : ESP32-C6 (RISC-V, single core, 512KB SRAM, NO PSRAM, 8MB flash)
;   Display: JD9853, 172x320 IPS, SPI (driven ST7789-compatible, col offset 34)
;   Touch  : AXS5106L capacitive, I2C @ 0x63
;   Storage: microSD (FAT) on the shared SPI bus, CS = GPIO4
;
; The official Espressif32 PlatformIO platform historically lags on the C6;
; the community pioarduino fork ships an arduino-esp32 3.x core with C6 support.
; Bump the release tag below if a newer core is needed.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-devkitc-1
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
board_build.partitions = esp32doom/partitions_8mb.csv

; This board has its own video/touch backend (Arduino_GFX, not TFT_eSPI) and no
; PSRAM, so it does NOT inherit ${env.build_flags}.
build_src_filter = ${doom.build_src_filter}
build_flags =
    ${doom.build_flags}
    -DDOOM_ESP32
    -DESP32C6_TOUCH_LCD_147
    ; ESP32-C6 USB is USB-Serial-JTAG (HWCDC); enable CDC-on-boot in HW mode so
    ; Serial works over the USB-C port (USB_MODE=1 avoids the native-USB path).
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DUSE_TOUCH_INPUT
    ; --- JD9853 LCD (SPI), driven via Arduino_GFX ST7789 driver ---
    -DLCD_SCK=1
    -DLCD_MOSI=2
    -DLCD_MISO=3
    -DLCD_CS=14
    -DLCD_DC=15
    -DLCD_RST=22
    -DLCD_BL=23
    -DLCD_PANEL_W=172
    -DLCD_PANEL_H=320
    -DLCD_COL_OFFSET=34
    -DLCD_ROW_OFFSET=0
    -DLCD_SPI_HZ=40000000
    ; DOOM is rendered in landscape (320 wide x 172 tall)
    -DDOOMGENERIC_RESX=320
    -DDOOMGENERIC_RESY=172
    ; --- RAM diet: trim renderer scratch arrays (BSS) to free heap for the
    ;     framebuffers + zone. These lower the engine's static limits; raise
    ;     them if you hit "no more visplanes"/opening overflow on busy maps. ---
    -DMAXVISPLANES=64
    -DMAXOPENINGS=7680
    -DMAXVISSPRITES=64
    -DMAXDRAWSEGS=192
    ; Single 64KB framebuffer (the C6's ~212KB free heap cannot hold two plus
    ; the zone + WAD directory). See README "Fitting in 512KB" for the budget.
    -DDOOM_SCREEN_BUFFERS=1
    ; Zone heap budget (bytes). With the WAD mmap'd from flash the zone no
    ; longer caches lumps, so the title/menu need very little. ~48KB fits
    ; alongside the framebuffer (64KB) + WAD directory (~55KB) in the C6's
    ; ~170KB usable heap. A full level's ~142KB of geometry still does not fit
    ; (see README "Fitting in 512KB"); raise this on a PSRAM board.
    -DDOOM_ZONE_SIZE=49152
    ; --- AXS5106L capacitive touch (I2C) ---
    -DTOUCH_SDA=18
    -DTOUCH_SCL=19
    -DTOUCH_RST=20
    -DTOUCH_INT=21
    ; --- microSD card (FAT) ---
    -DSD_CS=4
    ; Memory-map the IWAD from the raw "wad" flash partition (no RAM copies of
    ; lumps; keeps the zone heap for level geometry only). Flash the WAD with:
    ;   esptool.py write_flash 0x310000 doom1.wad
    -DWAD_IN_FLASH
    ; No physical game buttons on this board
    -DBUTTON_1=-1
    -DBUTTON_2=-1
    ; WAD/config search dir fallbacks if setenv() is unavailable at runtime
    -DDOOM_WADDIR=\"/sd\"
    -DDOOM_HOMEDIR=\"/sd\"

lib_deps =
    moononournation/GFX Library for Arduino @ ^1.4.9
